<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UINEEX Ai - Автономный ИИ</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Боковая панель управления */
        .sidebar {
            width: 280px;
            background-color: #252526;
            border-right: 1px solid #3c3c3c;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #569cd6;
            text-align: center;
        }

        .train-section {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #3c3c3c;
        }

        .train-section h3 {
            margin-top: 0;
            font-size: 14px;
            color: #4fc1ff;
        }

        input[type="text"] {
            width: 90%;
            padding: 8px;
            background-color: #1e1e1e;
            border: 1px solid #3c3c3c;
            color: white;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        /* Главная зона */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            max-width: 85%;
            line-height: 1.5;
        }

        .user-message { background-color: #2d2d2d; align-self: flex-end; border: 1px solid #3c3c3c; }
        .ai-message { background-color: #252526; align-self: flex-start; border: 1px solid #3c3c3c; width: 95%; }

        /* Стиль для режима размышления */
        .thinking {
            color: #858585;
            font-style: italic;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .input-area {
            padding: 20px;
            background-color: #252526;
            border-top: 1px solid #3c3c3c;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            height: 50px;
            background-color: #2d2d2d;
            border: 1px solid #3c3c3c;
            border-radius: 6px;
            color: #fff;
            padding: 10px;
            resize: none;
            font-family: inherit;
        }

        textarea:focus { outline: 1px solid #569cd6; }

        button {
            background-color: #0e639c;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #1177bb; }
        
        .status { font-size: 12px; color: #aaaaaa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="logo">UINEEX Ai</div>
            <div style="text-align:center; font-size:12px; color:#888;">Версия 1.2 (Авто-поиск)</div>
        </div>

        <div class="train-section">
            <h3>Статус базы знаний</h3>
            <div class="status" id="trainStatus">Загрузка памяти...</div>
        </div>

        <div style="margin-top: auto; font-size: 11px; color: #555;">Полная автономия без API</div>
    </div>

    <div class="main-container">
        <div class="chat-area" id="chatArea">
            <div class="message ai-message">
                Привет! Я <strong>UINEEX Ai</strong>. Теперь я полностью автономен! 
                <br><br>
                Просто спроси меня о чём угодно. Если я чего-то не знаю, я включу режим <strong>Thinking...</strong>, сам найду инфу в сети, занесу в память и объясню тебе!
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Спроси меня о чём-то (например: что такое HTML)..."></textarea>
            <button id="sendBtn">Запуск</button>
        </div>
    </div>

    <script>
        // Инициализация памяти при старте страницы
        if(!localStorage.getItem('ai_brain')) {
            localStorage.setItem('ai_brain', JSON.stringify({}));
        }
        
        updateStatus();

        function updateStatus() {
            const brain = JSON.parse(localStorage.getItem('ai_brain'));
            const topics = Object.keys(brain);
            const statusText = document.getElementById('trainStatus');
            if(topics.length > 0) {
                statusText.innerHTML = `ИИ уже помнит тем: <b>${topics.length}</b><br><span style="font-size:11px; color:#777;">(${topics.slice(-3).join(', ')}...)</span>`;
            } else {
                statusText.innerText = "Память пуста. Спроси меня о чем-то, чтобы я начал учиться!";
            }
        }

        // Очистка запроса от мусорных фраз
        function cleanQuery(query) {
            return query
                .replace(/(что такое|кто такой|расскажи про|расскажи о|кто такая|что за|знаешь ли ты)/gi, '')
                .trim();
        }

        // Функция «пересказа своими словами»
        function rephraseAI(rawText, topicName) {
            let sentences = rawText.split(/[.!?]\s+/);
            let coreInfo = sentences.slice(0, 3).join('. ');
            if (!coreInfo.endsWith('.')) coreInfo += '.';

            const intros = [
                `Слушай, я изучил свои архивы по теме <strong>${topicName}</strong>. Если на пальцах, то `,
                `А, <strong>${topicName}</strong>! Смотри, я разобрался. Короче говоря: `,
                `Вот как я это понимаю. Если отбросить тонну скучного текста, то <strong>${topicName}</strong> — это `,
                `По моим свежим данным, `
            ];

            const outros = [
                ` Надеюсь, теперь суть понятна!`,
                ` В общем, штука полезная, если вариться в этой теме.`,
                ` Если нужно копнуть глубже — маякни, раскопаю подробности.`
            ];

            const randomIntro = intros[Math.floor(Math.random() * intros.length)];
            const randomOutro = outros[Math.floor(Math.random() * outros.length)];

            return `${randomIntro}${coreInfo}${randomOutro}`;
        }

        // Функция автоматического поиска статьи на Википедии
        async function autoSearchWikipedia(cleanedTopic) {
            // Шаг 1: Ищем точное название статьи через OpenSearch
            const searchUrl = `https://ru.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(cleanedTopic)}&limit=1&format=json&origin=*`;
            
            try {
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();
                
                // Если ничего не нашли в поиске
                if (!searchData[1] || searchData[1].length === 0) return null;
                
                const exactTitle = searchData[1][0]; // Самое точное совпадение названия

                // Шаг 2: Выкачиваем текст этой статьи
                const contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(exactTitle)}&format=json&origin=*`;
                
                const contentResponse = await fetch(contentUrl);
                const contentData = await contentResponse.json();
                const pages = contentData.query.pages;
                const pageId = Object.keys(pages)[0];
                
                if (pageId === "-1") return null;

                return {
                    title: exactTitle,
                    text: pages[pageId].extract
                };
            } catch (e) {
                console.error("Ошибка при авто-поиске:", e);
                return null;
            }
        }

        // Главная логика чата
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatArea = document.getElementById('chatArea');
            const userRawText = input.value.trim();
            const query = userRawText.toLowerCase();
            
            if (query === '') return;

            // Отображаем сообщение пользователя
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = userRawText;
            chatArea.appendChild(userDiv);

            // Очищаем поле ввода сразу
            input.value = '';

            // Создаем блок ответа ИИ, но пока вешаем туда "Thinking..."
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-message';
            aiDiv.innerHTML = `<strong>UINEEX Ai:</strong><br><span class="thinking">Thinking...</span>`;
            chatArea.appendChild(aiDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Ищем в локальной памяти
            const brain = JSON.parse(localStorage.getItem('ai_brain'));
            let foundKnowledge = null;
            let matchedTopic = "";
            const cleaned = cleanQuery(query);

            for (let key in brain) {
                if (cleaned.includes(key) || key.includes(cleaned)) {
                    foundKnowledge = brain[key];
                    matchedTopic = key;
                    break;
                }
            }

            // Если нашли в памяти — выдаем ответ сразу
            if (foundKnowledge) {
                setTimeout(() => {
                    const aiExplanation = rephraseAI(foundKnowledge, matchedTopic.toUpperCase());
                    aiDiv.innerHTML = `<strong>UINEEX Ai:</strong><br><p>${aiExplanation}</p>`;
                    chatArea.scrollTop = chatArea.scrollHeight;
                }, 600); // Небольшая задержка для реализма
                return;
            }

            // ЕСЛИ НЕ НАШЛИ: Включается авто-поиск в сети!
            const searchResult = await autoSearchWikipedia(cleaned);

            if (searchResult && searchResult.text.trim() !== "") {
                // Сохраняем новую тему в память
                brain[searchResult.title.toLowerCase()] = searchResult.text;
                localStorage.setItem('ai_brain', JSON.stringify(brain));
                updateStatus();

                // Обновляем текст "Thinking..." на готовый пересказ
                const aiExplanation = rephraseAI(searchResult.text, searchResult.title.toUpperCase());
                aiDiv.innerHTML = `<strong>UINEEX Ai (Свежие данные из сети):</strong><br><p>${aiExplanation}</p>`;
            } else {
                // Если и в Википедии глухо
                aiDiv.innerHTML = `<strong>UINEEX Ai:</strong><br>Я честно поискал в сети по запросу "${cleaned}", но даже там ничего толкового не нашлось. Попробуй перефразировать тему!`;
            }
            
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Кнопка и Enter
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
