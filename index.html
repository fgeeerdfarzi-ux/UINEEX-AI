<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UINEEX Ai - Живая Генерация</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background-color: #252526;
            border-right: 1px solid #3c3c3c;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .logo { font-size: 22px; font-weight: bold; color: #569cd6; text-align: center; }

        .panel-box {
            background-color: #2d2d2d;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #3c3c3c;
        }

        .panel-box h3 { margin-top: 0; font-size: 13px; color: #4fc1ff; }

        .main-container { flex: 1; display: flex; flex-direction: column; height: 100vh; }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #1e1e1e;
        }

        .message { padding: 15px; border-radius: 6px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }
        .user-message { background-color: #2d2d2d; align-self: flex-end; border: 1px solid #3c3c3c; }
        .ai-message { background-color: #252526; align-self: flex-start; border: 1px solid #3c3c3c; width: 95%; box-sizing: border-box; }

        .thinking { color: #858585; font-style: italic; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .input-area { padding: 15px; background-color: #252526; border-top: 1px solid #3c3c3c; display: flex; gap: 10px; }

        textarea {
            width: 100%;
            background-color: #2d2d2d;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            color: #fff;
            padding: 12px;
            font-family: inherit;
            box-sizing: border-box;
            resize: none;
            height: 46px;
            font-size: 16px;
        }

        textarea:focus { outline: 1px solid #569cd6; }

        button {
            background-color: #0e639c; color: white; border: none; border-radius: 6px;
            padding: 10px 20px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #1177bb; }
        .status { font-size: 11px; color: #aaaaaa; margin-top: 5px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #3c3c3c; padding: 10px; }
            .panel-box { display: none; }
            .chat-area { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">UINEEX Ai</div>
        
        <div class="panel-box">
            <h3>📊 Вероятностная Матрица</h3>
            <div class="status" id="matrixStatus">Параметры: 0 токенов</div>
            <button id="clearWeightsBtn" style="width:100%; margin-top:10px; padding:4px; font-size:11px; background-color:#a12626; border:none; color:white; border-radius:4px; cursor:pointer;">Сбросить веса</button>
        </div>

        <div class="panel-box">
            <h3>🧠 Состояние системы</h3>
            <div class="status" id="debugStatus">Режим: Ожидание</div>
        </div>
    </div>

    <div class="main-container">
        <div class="chat-area" id="chatArea">
            <div class="message ai-message">
                Привет! Я активировал функцию **Потокового Вывода Текста**. 
                <br><br>
                Теперь мои ответы генерируются пошагово прямо у тебя на глазах. Задай мне вопрос, чтобы увидеть, как работает живой синтез весов!
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Напиши слово или тему..."></textarea>
            <button id="sendBtn">ИИ</button>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('ai_weights')) {
            localStorage.setItem('ai_weights', JSON.stringify({}));
        }

        updateMatrixStatus();

        function updateMatrixStatus() {
            const weights = JSON.parse(localStorage.getItem('ai_weights'));
            const totalLinks = Object.keys(weights).length;
            document.getElementById('matrixStatus').innerHTML = `В базе параметров: <b>${totalLinks} уникальных слов</b>`;
        }

        document.getElementById('clearWeightsBtn').addEventListener('click', () => {
            if(confirm("Вы уверены, что хотите стереть все выученные токены?")) {
                localStorage.setItem('ai_weights', JSON.stringify({}));
                location.reload();
            }
        });

        function trainModelOnText(text) {
            const words = text.toLowerCase()
                .replace(/[^a-zа-яё0-9\s]/g, ' ')
                .split(/\s+/)
                .filter(w => w.length > 1);

            if(words.length < 2) return false;
            const weights = JSON.parse(localStorage.getItem('ai_weights'));

            for (let i = 0; i < words.length - 1; i++) {
                const currentWord = words[i];
                const nextWord = words[i + 1];
                if (!weights[currentWord]) weights[currentWord] = [];
                weights[currentWord].push(nextWord);
            }

            localStorage.setItem('ai_weights', JSON.stringify(weights));
            updateMatrixStatus();
            return true;
        }

        async function fetchLearningData(topic) {
            const searchUrl = `https://ru.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(topic)}&limit=1&format=json&origin=*`;
            try {
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();
                if (!searchData[1] || searchData[1].length === 0) return null;
                
                const exactTitle = searchData[1][0];
                const contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(exactTitle)}&format=json&origin=*`;
                
                const contentResponse = await fetch(contentUrl);
                const contentData = await contentResponse.json();
                return contentData.query.pages[Object.keys(contentData.query.pages)[0]].extract;
            } catch (e) {
                return null;
            }
        }

        function generateTextFromWeights(startPhrase, maxWords = 30) {
            const weights = JSON.parse(localStorage.getItem('ai_weights'));
            const inputWords = startPhrase.toLowerCase().replace(/[^a-zа-яё0-9\s]/g, ' ').split(/\s+/).filter(w => w.length > 0);
            let currentWord = inputWords[inputWords.length - 1];
            
            if (!weights[currentWord]) {
                const allKeys = Object.keys(weights);
                if(allKeys.length === 0) return null;
                currentWord = allKeys[Math.floor(Math.random() * allKeys.length)];
            }

            let resultChain = [currentWord];

            for (let i = 0; i < maxWords; i++) {
                const possibilities = weights[currentWord];
                if (!possibilities || possibilities.length === 0) break;
                const nextWord = possibilities[Math.floor(Math.random() * possibilities.length)];
                resultChain.push(nextWord);
                currentWord = nextWord;
            }

            let finalSentence = resultChain.join(' ');
            return finalSentence.charAt(0).toUpperCase() + finalSentence.slice(1) + '.';
        }

        // ================= ТЕХНОЛОГИЯ СТРИМИНГА (ПОШАГОВАЯ ПЕЧАТЬ) =================
        async function printResponseByWords(element, prefix, fullText) {
            element.innerHTML = `<strong>${prefix}</strong><br><p></p>`;
            const pElement = element.querySelector('p');
            const words = fullText.split(' ');

            for (let word of words) {
                pElement.innerHTML += word + ' ';
                // Авто-скролл вниз при появлении каждого нового слова
                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                // Задержка в 80 миллисекунд между словами для эффекта генерации
                await new Promise(resolve => setTimeout(resolve, 80));
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatArea = document.getElementById('chatArea');
            const userRawText = input.value.trim();
            
            if (userRawText === '') return;

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = userRawText;
            chatArea.appendChild(userDiv);
            input.value = '';

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-message';
            aiDiv.innerHTML = `<strong>UINEEX Ai:</strong><br><span class="thinking">Анализ токенов матрицы...</span>`;
            chatArea.appendChild(aiDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            const weights = JSON.parse(localStorage.getItem('ai_weights'));
            const words = userRawText.toLowerCase().split(/\s+/);
            const lastWord = words[words.length - 1];

            if (weights[lastWord]) {
                document.getElementById('debugStatus').innerHTML = `Режим: <b style="color:#4fc1ff;">СИНТЕЗ</b>`;
                
                // Эмуляция размышления перед началом печати
                await new Promise(resolve => setTimeout(resolve, 400));
                
                const generatedOutput = generateTextFromWeights(userRawText);
                // Запуск живой печати
                await printResponseByWords(aiDiv, "UINEEX Ai (Локальный Синтез):", generatedOutput);
                
            } else {
                document.getElementById('debugStatus').innerHTML = `Режим: <b style="color:#e9ae45;">ОБУЧЕНИЕ...</b>`;
                aiDiv.innerHTML = `<strong>UINEEX Ai:</strong><br><span class="thinking">Ищу тексты и подгоняю веса для темы "${userRawText}"...</span>`;

                const freshText = await fetchLearningData(userRawText);

                if (freshText) {
                    trainModelOnText(freshText);
                    const generatedOutput = generateTextFromWeights(userRawText);
                    
                    // Печать свежевыученного текста
                    await printResponseByWords(aiDiv, "UINEEX Ai (Свежие веса матрицы):", generatedOutput);
                } else {
                    aiDiv.innerHTML = `<strong>UINEEX Ai:</strong><br><p>Я не знаю слова "${userRawText}" и не смог найти обучающих текстов в сети. Давай попробуем другую тему!</p>`;
                }
            }
            
            document.getElementById('debugStatus').innerText = "Режим: Ожидание";
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
